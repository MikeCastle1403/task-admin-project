<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow - Gestión de Tareas Hermosa</title>
    <meta name="description" content="Una aplicación de gestión de tareas fluida y moderna.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container" id="app-container" style="display:none">
        <header class="app-header">
            <div class="header-main">
                <div class="title-row">
                    <h1>Taskflow</h1>
                    <button id="theme-toggle-app" class="icon-btn theme-toggle" title="Cambiar tema">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
                <p>Gestiona tus tareas sin esfuerzo</p>
            </div>
            <div class="user-info" id="user-info">
                <span id="user-greeting" class="user-email-text"></span>
                <button id="logout-btn" class="logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Cerrar sesión
                </button>
            </div>
        </header>

        <div class="app-layout">
            <div class="main-content">
                <div id="add-task-wrapper" class="add-task-wrapper">
                    <button id="toggle-form-btn" class="primary-btn toggle-add-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Crear nueva tarea
                    </button>
                </div>

        <section id="task-form-section" class="task-form-section glass-panel collapsible hidden">
            <div class="form-header">
                <h2>Añadir nueva tarea</h2>
                <button type="button" id="close-form-btn" class="icon-btn close-form">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="task-form">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="task-title">Título <span class="required">*</span></label>
                        <input type="text" id="task-title" placeholder="¿Qué hay que hacer?" required
                            autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Prioridad</label>
                        <select id="task-priority" class="form-select">
                            <option value="baja">Baja prioridad</option>
                            <option value="alta">Alta prioridad</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-desc">Descripción (Opcional)</label>
                    <textarea id="task-desc" placeholder="Añade algunos detalles..." rows="3"></textarea>
                </div>
                <button type="submit" class="primary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Añadir tarea
                </button>
            </form>
        </section>

        <section class="task-controls-section glass-panel">
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar tareas por título o descripción...">
            </div>

            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="in-progress">En progreso</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>
        </section>

        <section class="task-list-section">
            <div id="empty-state" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <p>No se encontraron tareas. ¡Añade una nueva tarea para empezar!</p>
            </div>

            <ul id="task-list" class="task-list">
            </ul>
        </section>
        </div> <!-- end main content -->
        <aside class="dashboard-sidebar glass-panel">
            <h3>Resumen</h3>
            <div class="stat-box">
                <span class="stat-label">Tareas completadas</span>
                <span id="stat-completed" class="stat-number">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Tareas en progreso</span>
                <span id="stat-progress" class="stat-number">0</span>
            </div>
        </aside>
        </div> <!-- end app layout -->
    </main>

    <!-- Edit Task Modal -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Editar tarea</h2>
                <button id="close-modal" class="icon-btn" aria-label="Close modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-task-id">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="edit-task-title">Título <span class="required">*</span></label>
                        <input type="text" id="edit-task-title" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="edit-task-priority">Prioridad</label>
                        <select id="edit-task-priority" class="form-select">
                            <option value="baja">Baja prioridad</option>
                            <option value="alta">Alta prioridad</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-task-desc">Descripción (Opcional)</label>
                    <textarea id="edit-task-desc" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-edit" class="secondary-btn">Cancelar</button>
                    <button type="submit" class="primary-btn">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-header">
                <div class="title-row central">
                    <h1 class="auth-logo">Taskflow</h1>
                    <button id="theme-toggle-auth" class="icon-btn theme-toggle" title="Cambiar tema">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
                <p class="auth-subtitle">Tu gestor de tareas personal</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Iniciar sesión</button>
                <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Registrarse</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" placeholder="tu@ejemplo.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="Tu contraseña" required
                        autocomplete="current-password">
                </div>
                <p id="login-error" class="auth-error" style="display:none"></p>
                <button type="submit" class="primary-btn" id="login-submit-btn">Iniciar sesión</button>

                <div class="auth-divider">
                    <span>o continuar con</span>
                </div>

                <div class="social-auth">
                    <button type="button" id="github-login" class="social-btn github">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7a3.37 3.37 0 0 0-.94 2.58V22">
                            </path>
                        </svg>
                        GitHub
                    </button>
                    <button type="button" id="google-login" class="social-btn google">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 8v8"></path>
                            <path d="M8 12h8"></path>
                        </svg>
                        Google
                    </button>
                </div>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form" style="display:none">
                <div class="form-group">
                    <label for="signup-username">Nombre de usuario</label>
                    <input type="text" id="signup-username" placeholder="Elige un nombre de usuario" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="signup-email">Correo electrónico</label>
                    <input type="email" id="signup-email" placeholder="tu@ejemplo.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Contraseña</label>
                    <input type="password" id="signup-password" placeholder="Al menos 6 caracteres" required
                        autocomplete="new-password">
                </div>
                <p id="signup-error" class="auth-error" style="display:none"></p>
                <button type="submit" class="primary-btn" id="signup-submit-btn">Crear cuenta</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
